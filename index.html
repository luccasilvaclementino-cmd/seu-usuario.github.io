<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare Clínica Veterinária e Pet Shop</title>
    <meta name="description" content="Clínica Veterinária em Alumínio-SP. Consultas, Cirurgias, Dermatologia e Banho e Tosa. Atendimento com a Dra. Jessica Borges.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --dark: #1a252f;
            --text: #4a4a4a;
            --gold: #f1c40f;
            --bg-color: #f4fcf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text); line-height: 1.6; overflow-x: hidden; position: relative; }

        /* Fundo Animado */
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: #a7f3d0; border-radius: 50%; filter: blur(90px); opacity: 0.5; animation: float 12s infinite alternate; }
        .shape2 { position: absolute; bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: #dcfce7; border-radius: 50%; filter: blur(100px); opacity: 0.6; animation: float 15s infinite alternate-reverse; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-40px) scale(1.05); } }

        /* Animação Scroll */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Vidro Premium */
        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; box-shadow: 0 10px 30px rgba(31, 38, 135, 0.05); overflow: hidden; }

        /* Nav */
        nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px 5%; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.5); position: sticky; top: 0; z-index: 1000; }
        nav h2 { color: var(--primary); font-weight: 700; font-size: 1.6rem; display: flex; align-items: center; gap: 8px; }

        /* Hero */
        header { position: relative; padding: 80px 5%; min-height: 85vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1601758228041-f3b279ce7bec?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover; }
        .hero-glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 50px 40px; border-radius: 24px; text-align: center; max-width: 650px; z-index: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.9); }
        .hero-glass-card h1 { font-size: 3rem; margin-bottom: 15px; line-height: 1.1; color: var(--dark); }
        .hero-glass-card h1 span { color: var(--primary); }
        .hero-glass-card p { font-size: 1.1rem; margin-bottom: 25px; color: #444; font-weight: 500; }
        .rating { color: var(--gold); font-size: 1.2rem; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 30px; }
        .rating span { color: var(--dark); font-size: 1rem; }

        /* Botões */
        .btn-large { display: inline-flex; align-items: center; gap: 10px; background: var(--primary); color: #fff; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); transition: all 0.3s; }
        .btn-large:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(39, 174, 96, 0.4); background: var(--dark); }

        /* Seções */
        section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 2.5rem; color: var(--dark); }
        .section-title h2 span { color: var(--primary); }

        /* Doutora (Foto Real DOUTORA.JPG) */
        .doctor-section { display: flex; gap: 50px; align-items: center; padding: 40px; margin-bottom: 40px; }
        .doc-image { flex: 1; }
        .doc-image img { width: 100%; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 5px solid #fff; object-fit: cover; }
        .doc-info { flex: 1.2; }
        .doc-info h3 { font-size: 2.2rem; color: var(--primary); margin-bottom: 5px; }
        .doc-info h4 { font-size: 1.1rem; color: var(--dark); margin-bottom: 20px; font-weight: 600; }
        .doc-info p { margin-bottom: 20px; }
        .doc-info ul { list-style: none; }
        .doc-info ul li { margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; }
        .doc-info ul li i { color: var(--secondary); font-size: 1.2rem; margin-top: 3px; }

        /* Cirurgia (Foto Real 133258.JPG) */
        .surgery-highlight { display: flex; gap: 40px; align-items: center; padding: 40px; margin-top: 40px; flex-direction: row-reverse; }
        .surgery-image img { width: 100%; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 5px solid #fff; }

        /* Cards */
        .service-category { margin-bottom: 60px; }
        .service-category h3 { font-size: 1.8rem; color: var(--dark); margin-bottom: 30px; text-align: center; border-bottom: 2px solid rgba(39, 174, 96, 0.2); padding-bottom: 10px; display: inline-block; left: 50%; position: relative; transform: translateX(-50%); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { padding: 40px 30px; text-align: center; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.8); }
        .card i { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
        .card h4 { color: var(--dark); margin-bottom: 15px; font-size: 1.3rem; }

        /* Avaliações */
        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .review-card { padding: 30px; position: relative; }
        .review-card i.fa-quote-left { font-size: 2rem; color: rgba(39, 174, 96, 0.2); position: absolute; top: 20px; left: 20px; }
        .review-card p { font-style: italic; color: #555; margin-bottom: 20px; margin-top: 15px; position: relative; z-index: 1; }
        .reviewer h5 { color: var(--dark); font-size: 1.1rem; }
        .reviewer span { color: var(--gold); font-size: 0.9rem; }

        /* FAQ */
        .faq-container { max-width: 800px; margin: 0 auto; }
        details { background: rgba(255,255,255,0.6); border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s; }
        details:hover { background: rgba(255,255,255,0.9); }
        summary { padding: 20px; font-weight: 600; color: var(--dark); cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--primary); transition: 0.3s; }
        details[open] summary::after { transform: rotate(180deg); }
        .faq-content { padding: 0 20px 20px; color: #555; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 10px; padding-top: 15px; }

        /* Contato */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 50px; }
        .info-item { text-align: center; padding: 30px; }
        .info-item i { font-size: 2.2rem; color: var(--primary); margin-bottom: 15px; }
        
        footer { text-align: center; padding: 40px 20px; background: rgba(26, 37, 47, 0.98); color: #fff; margin-top: 50px; }
        footer p { margin-bottom: 5px; opacity: 0.8; font-size: 0.95rem; }
